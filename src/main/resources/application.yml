# Tomcat
server:
    tomcat:
        uri-encoding: UTF-8
    port: ${SERVER_PORT:8080}
    servlet:
        context-path: ${CONTEXT_PATH:/hire}


spring:
    datasource:
        driverClassName: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
        url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/hire?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&useSSL=false}
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:123456}

#        driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
#        url: jdbc:sqlserver://127.0.0.1:1433;DatabaseName=hire
#        username: sa
#        password: 123456

    servlet:
      multipart:
        max-file-size: 300MB
        max-request-size: 300MB
    resources:
      static-locations: classpath:static/,file:static/

#mybatis
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.entity
  global-config:
    db-config:
      #主键类型  0:"数据库ID自增", 1:"用户输入ID",2:"全局唯一ID (数字类型唯一ID)", 3:"全局唯一ID UUID";
      id-type: auto
      #逻辑删除配置
      logic-delete-value: -1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'

ai:
  assistant:
    enabled: ${AI_ASSISTANT_ENABLED:false}
    api-url: ${AI_ASSISTANT_API_URL:https://api.openai.com/v1/chat/completions}
    api-key: ${AI_ASSISTANT_API_KEY:}
    auth-header: ${AI_ASSISTANT_AUTH_HEADER:Authorization}
    auth-scheme: ${AI_ASSISTANT_AUTH_SCHEME:Bearer}
    model: ${AI_ASSISTANT_MODEL:gpt-4o-mini}
    timeout-ms: ${AI_ASSISTANT_TIMEOUT_MS:30000}
    system-prompt: ${AI_ASSISTANT_SYSTEM_PROMPT:你是一名校园招聘求职助手，请结合求职场景提供准确、可执行、结构化的建议。}
